<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ event_name or 'Civic Feedback' }}{% endblock %}</title>

    <!-- Handle sub-path routing by setting the base URL for all relative links -->
    <base href="{{ BASE_PATH }}/">

    <!-- 1. Universal CSS (Explicit Path) -->
    <link rel="stylesheet" href="{{ BASE_PATH }}/static/css/apex-modern.css">
    <!-- 2. App-specific styles (Explicit Path) -->
    <link rel="stylesheet" href="{{ BASE_PATH }}/static/css/style.css">
    <link rel="icon" type="image/x-icon" href="{{ BASE_PATH }}/static/favicon.ico">

    {% block styles %}{% endblock %}
</head>

<body>
    <!-- AAS-1.0: Inject global base path for Javascript -->
    <script>window.APP_BASE_PATH = "{{ BASE_PATH }}";</script>

    <!-- STANDARD HEADER -->
    <header>
        <div class="app-container">
            <div class="header-content"
                style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <img src="{{ BASE_PATH }}/static/logo.svg" class="app-logo" alt="App Logo">
                    <h1 class="title-display">{% block header_title %}{{ event_name or 'Feedback Management' }}{%
                        endblock %}</h1>
                </div>

                <nav class="nav-links"
                    style="display: flex; gap: 1.5rem; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.875rem;">
                    {% block nav %}
                    <a href="./" class="nav-link">Kiosk</a>
                    <a href="display/" class="nav-link">Display</a>
                    <a href="admin/" class="nav-link">Admin</a>
                    {% endblock %}
                </nav>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <div class="app-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>

</html>
