<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ event_name or 'Civic Feedback' }}{% endblock %}</title>

    <!-- 1. Universal CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/apex-modern.css') }}">
    <!-- 2. App-specific styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block styles %}{% endblock %}
</head>

<body>
    <!-- SCRIPT_ROOT for JS -->
    <script>const SCRIPT_ROOT = "{{ request.script_root }}";</script>

    <!-- STANDARD HEADER -->
    <header>
        <div class="app-container">
            <div class="header-content"
                style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <img src="{{ url_for('static', filename='logo.svg') }}" class="app-logo" alt="App Logo">
                    <h1 class="title-display">{% block header_title %}{{ event_name or 'Feedback Management' }}{%
                        endblock %}</h1>
                </div>

                <nav class="nav-links"
                    style="display: flex; gap: 1.5rem; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.875rem;">
                    {% block nav %}
                    <a href="{{ url_for('public.index') }}" class="nav-link">Kiosk</a>
                    <a href="{{ url_for('display.display_dashboard') }}" class="nav-link">Display</a>
                    <a href="{{ url_for('admin.dashboard') }}" class="nav-link">Admin</a>
                    {% endblock %}
                </nav>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        <div class="app-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}
</body>

</html>
