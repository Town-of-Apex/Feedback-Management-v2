<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event_name }} | Feedback</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1 id="event-title">{{ event_name }}</h1>
            <div class="progress-container" id="progress-wrapper" style="display:none;">
                <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>
            <p id="progress" style="font-size: 0.8rem; color: var(--text-muted);"></p>
        </header>

        <main id="app">
            <!-- SPA Content Loaded via JS -->
            <div class="card">
                <p>Loading questions...</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>

</html>
