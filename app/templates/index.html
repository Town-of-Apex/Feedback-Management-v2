{% extends "base.html" %}

{% block title %}{{ event_name }} | Feedback{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <p class="metadata">{{ event_name }}</p>
    
    <div class="progress-container" id="progress-wrapper" style="display:none; margin: 1rem 0;">
        <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>
    <p id="progress" class="metadata" style="text-transform: none; margin-bottom: 2rem;"></p>

    <div id="app">
        <!-- SPA Content Loaded via JS -->
        <div class="inner-well" style="text-align: center; padding: 3rem;">
            <p>Establishing connection...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
    const EVENT_KEY = "{{ event_key }}";
</script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
