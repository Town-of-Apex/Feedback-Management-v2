<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event_name }} | Live Results</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
</head>

<body>
    <div class="display-wrapper">
        <aside class="display-sidebar">
            <h1 class="event-name-large">{{ event_name }}</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Join the Conversation</p>
            <img src="/static/qr.png" alt="Scan to participate">
            <p style="font-weight: bold; font-size: 1.2rem; margin-top: 10px;">Scan to Join</p>
            <p id="tunnel-url" style="color: var(--primary); font-family: monospace;"></p>
        </aside>

        <main class="display-main">
            <div id="charts" class="chart-grid">
                <!-- Charts injected here -->
            </div>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/charts.js"></script>
    <script>
        const socket = io();
        socket.on('new_response', (data) => {
            console.log('Update received for question:', data.question_id);
            // Re-fetch or update chart
            if (window.updateCharts) window.updateCharts();
        });
    </script>
</body>

</html>
