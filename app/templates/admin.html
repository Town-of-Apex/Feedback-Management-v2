<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <header class="nav-header">
        <div class="nav-container">
            <h1 class="title-font" style="font-size: 1.5rem; margin: 0;">Admin Dashboard</h1>
            <nav class="nav-links">
                <a href="/" target="_blank" class="nav-link">Kiosk Mode</a>
                <a href="/display" target="_blank" class="nav-link">Display Board</a>
                <a href="/admin/export" class="nav-link">Export Responses</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <section class="card">
            <h2>Add New Question</h2>
            <form action="/admin/questions/add" method="POST">
                <input type="text" name="title" placeholder="Question Title" required>
                <textarea name="description" placeholder="Description (optional)"></textarea>
                <select name="type">
                    <option value="single_select">Single Select Poll</option>
                    <option value="multi_select">Multi-Select (Checkboxes)</option>
                    <option value="short_text">Short Text / Idea List</option>
                    <option value="word_cloud">Word Cloud</option>
                    <option value="ranking">Ranking</option>
                </select>
                <input type="text" name="options" placeholder="Options (comma separated for polls)">
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Add Question</button>
            </form>
        </section>

        <section class="card">
            <h2>Active Questions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for q in questions %}
                    <tr>
                        <td>{{ q.title }}</td>
                        <td>{{ q.type }}</td>
                        <td>
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                <form action="/admin/questions/{{q.id}}/toggle" method="POST" style="margin: 0;">
                                    <button type="submit" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">
                                        {% if q.active %}Deactivate{% else %}Activate{% endif %}
                                    </button>
                                </form>
                                <a href="/admin/questions/{{q.id}}/edit" class="btn btn-secondary" 
                                   style="padding: 0.4rem 0.8rem; font-size: 0.75rem; text-decoration: none;">Edit</a>
                                <form action="/admin/questions/{{q.id}}/delete" method="POST"
                                    style="margin: 0;"
                                    onsubmit="return confirm('Delete this question and all its responses?');">
                                    <button type="submit" class="btn btn-secondary" style="color: var(--danger); padding: 0.4rem 0.8rem; font-size: 0.75rem;">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>

</html>
