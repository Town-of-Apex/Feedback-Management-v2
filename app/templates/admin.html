<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            background: var(--idea-bubble-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
        }

        .btn-active {
            background: var(--success);
            color: #fff;
            padding: 4px 8px;
            width: auto;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-inactive {
            background: var(--text-muted);
            color: #fff;
            padding: 4px 8px;
            width: auto;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete {
            background: var(--danger);
            color: #fff;
            padding: 4px 8px;
            width: auto;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 900px;">
        <header>
            <h1>Admin Dashboard</h1>
            <a href="/" target="_blank" class="btn btn-primary"
                style="display:inline-block; width:auto; padding:8px 16px; background: #818cf8;">Launch
                Kiosk Mode</a>
            <a href="/display" target="_blank" class="btn btn-primary"
                style="display:inline-block; width:auto; padding:8px 16px; margin-left:10px;">Open Display Board</a>
        </header>

        <section class="card">
            <h2>Add New Question</h2>
            <form action="/admin/questions/add" method="POST">
                <input type="text" name="title" placeholder="Question Title" required>
                <textarea name="description" placeholder="Description (optional)"></textarea>
                <select name="type">
                    <option value="single_select">Single Select Poll</option>
                    <option value="multi_select">Multi-Select (Checkboxes)</option>
                    <option value="short_text">Short Text / Idea List</option>
                    <option value="word_cloud">Word Cloud</option>
                    <option value="ranking">Ranking</option>
                </select>
                <input type="text" name="options" placeholder="Options (comma separated for polls)">
                <button type="submit" class="btn btn-primary" style="margin-top:10px;">Add Question</button>
            </form>
        </section>

        <section class="card">
            <h2>Active Questions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for q in questions %}
                    <tr>
                        <td>{{ q.title }}</td>
                        <td>{{ q.type }}</td>
                        <td>
                            <form action="/admin/questions/{{q.id}}/toggle" method="POST" style="display:inline;">
                                <button type="submit"
                                    class="{% if q.active %}btn-active{% else %}btn-inactive{% endif %}">
                                    {% if q.active %}Deactivate{% else %}Activate{% endif %}
                                </button>
                            </form>
                            <form action="/admin/questions/{{q.id}}/delete" method="POST"
                                style="display:inline; margin-left: 5px;"
                                onsubmit="return confirm('Delete this question and all its responses?');">
                                <button type="submit" class="btn-delete">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>

</html>
