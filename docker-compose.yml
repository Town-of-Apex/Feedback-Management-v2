services:
  feedback-app:
    container_name: feedback-app
    build: .
    environment:
      - BASE_PATH=/feedback
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      # ROUTE: Match anything starting with /feedback
      - "traefik.http.routers.feedback.rule=PathPrefix(`/feedback`)"
      # PORT: Tell Traefik the app listens on 8080
      - "traefik.http.services.feedback.loadbalancer.server.port=8080"
    ports:
      - "8080:8080"

networks:
  apex-internal:
    external: true
